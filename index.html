<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emojily - Coming Soon</title>
    <meta name="description" content="Emojily - Track your daily mood with emojis. Coming soon to the App Store.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0f;
            color: #fff;
            overflow: hidden;
            position: relative;
        }

        .bg-gradient {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 20% 30%, rgba(131, 58, 180, 0.15) 0%, transparent 70%),
                radial-gradient(ellipse 50% 40% at 80% 60%, rgba(253, 121, 168, 0.12) 0%, transparent 70%),
                radial-gradient(ellipse 40% 30% at 50% 80%, rgba(252, 176, 69, 0.08) 0%, transparent 70%);
            z-index: 0;
        }

        .floating-emojis {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .floating-emoji {
            position: absolute;
            font-size: 2rem;
            opacity: 0.08;
            animation: float linear infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(110vh) rotate(0deg);
            }
            100% {
                transform: translateY(-10vh) rotate(360deg);
            }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            max-width: 520px;
        }

        .logo-emoji {
            font-size: 4.5rem;
            margin-bottom: 1.5rem;
            display: inline-block;
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 0.25rem;
            background: linear-gradient(135deg, #fff 0%, #c4b5fd 50%, #f9a8d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            font-size: 1.15rem;
            color: rgba(255, 255, 255, 0.55);
            font-weight: 400;
            margin-bottom: 2.5rem;
            line-height: 1.5;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1.25rem;
            border-radius: 100px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 500;
            margin-bottom: 2.5rem;
            backdrop-filter: blur(10px);
        }

        .badge .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #34d399;
            animation: blink 2s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .notify-form {
            display: flex;
            gap: 0.5rem;
            max-width: 400px;
            margin: 0 auto 2rem;
        }

        .notify-form input {
            flex: 1;
            padding: 0.8rem 1.2rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
            backdrop-filter: blur(10px);
        }

        .notify-form input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .notify-form input:focus {
            border-color: rgba(196, 181, 253, 0.4);
            background: rgba(255, 255, 255, 0.08);
        }

        .notify-form button {
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #8b5cf6, #a855f7);
            color: #fff;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s;
            white-space: nowrap;
        }

        .notify-form button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.4);
        }

        .notify-form button:active {
            transform: translateY(0);
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 0.5rem;
            flex-wrap: wrap;
        }

        .feature {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
        }

        .feature-icon {
            font-size: 1.5rem;
        }

        .feature-text {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 500;
        }

        .success-msg {
            display: none;
            color: #34d399;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        @media (max-width: 480px) {
            h1 { font-size: 2.2rem; }
            .tagline { font-size: 1rem; }
            .notify-form { flex-direction: column; }
            .features { gap: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="floating-emojis" id="floatingEmojis"></div>

    <div class="container">
        <div class="logo-emoji">😊</div>
        <h1>Emojily</h1>
        <p class="tagline">Track your daily mood with emojis.<br>Understand your emotions, one day at a time.</p>

        <div class="badge">
            <span class="dot"></span>
            Coming soon to the App Store
        </div>

        <form class="notify-form" id="notifyForm">
            <input type="email" placeholder="Enter your email" required aria-label="Email address">
            <button type="submit">Notify Me</button>
        </form>

        <p class="success-msg" id="successMsg">You're on the list! We'll let you know when we launch.</p>

        <div class="features">
            <div class="feature">
                <span class="feature-icon">📅</span>
                <span class="feature-text">Daily tracking</span>
            </div>
            <div class="feature">
                <span class="feature-icon">📊</span>
                <span class="feature-text">Mood insights</span>
            </div>
            <div class="feature">
                <span class="feature-icon">🔒</span>
                <span class="feature-text">Private & secure</span>
            </div>
        </div>
    </div>

    <script>
        // Floating background emojis
        const emojis = ['😊', '😴', '😢', '🥰', '😤', '🤔', '😎', '🥳', '😌', '🫠'];
        const container = document.getElementById('floatingEmojis');

        for (let i = 0; i < 15; i++) {
            const el = document.createElement('span');
            el.className = 'floating-emoji';
            el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            el.style.left = Math.random() * 100 + '%';
            el.style.animationDuration = (15 + Math.random() * 20) + 's';
            el.style.animationDelay = -(Math.random() * 30) + 's';
            el.style.fontSize = (1.2 + Math.random() * 1.5) + 'rem';
            container.appendChild(el);
        }

        // Form handling (client-side only)
        document.getElementById('notifyForm').addEventListener('submit', function(e) {
            e.preventDefault();
            this.style.display = 'none';
            document.getElementById('successMsg').style.display = 'block';
        });
    </script>
</body>
</html>
